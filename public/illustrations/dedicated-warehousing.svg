<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none" role="img" aria-label="Dedicated warehouse site with wide-aisle racking">
  <defs>
    <linearGradient id="dw-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f8f9"/>
      <stop offset="1" stop-color="#e7ebee"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#dw-bg)"/>
  <circle cx="160" cy="480" r="170" fill="#e50019" opacity="0.05"/>
  <g stroke="#22262a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <!-- building outline -->
    <path d="M150 250 L400 130 L650 250 L650 500 L150 500 Z" fill="#ffffff"/>
    <!-- roof line -->
    <path d="M150 250 L400 130 L650 250"/>
  </g>
  <g stroke="#22262a" stroke-width="6" stroke-linejoin="round">
    <!-- shutter door -->
    <rect x="330" y="350" width="140" height="150" rx="4" fill="#e50019" stroke="#e50019"/>
    <line x1="330" y1="390" x2="470" y2="390" stroke="#ffffff" stroke-width="4"/>
    <line x1="330" y1="425" x2="470" y2="425" stroke="#ffffff" stroke-width="4"/>
    <line x1="330" y1="460" x2="470" y2="460" stroke="#ffffff" stroke-width="4"/>
    <!-- windows -->
    <rect x="200" y="300" width="70" height="60" rx="4" fill="#ffffff"/>
    <rect x="530" y="300" width="70" height="60" rx="4" fill="#ffffff"/>
  </g>
</svg>
