<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none" role="img" aria-label="Co-packing, bundling and labelling">
  <defs>
    <linearGradient id="cp-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f8f9"/>
      <stop offset="1" stop-color="#e7ebee"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#cp-bg)"/>
  <circle cx="170" cy="150" r="150" fill="#e50019" opacity="0.05"/>
  <g stroke="#22262a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <!-- table -->
    <line x1="90" y1="470" x2="710" y2="470" opacity="0.9"/>
    <!-- open carton (isometric) -->
    <path d="M250 250 L450 250 L530 320 L330 320 Z" fill="#ffffff"/>
    <path d="M330 320 L330 470 L250 400 L250 250 Z" fill="#ffffff"/>
    <path d="M330 320 L530 320 L530 470 L330 470 Z" fill="#f1f3f4"/>
  </g>
  <g stroke="#22262a" stroke-width="6" stroke-linejoin="round">
    <!-- bundled items inside -->
    <rect x="360" y="180" width="55" height="120" rx="4" fill="#e50019" stroke="#e50019"/>
    <rect x="425" y="200" width="55" height="100" rx="4" fill="#ffffff"/>
    <!-- shipping label -->
    <rect x="385" y="370" width="110" height="70" rx="4" fill="#ffffff"/>
    <line x1="405" y1="392" x2="475" y2="392" stroke="#22262a" stroke-width="4"/>
    <line x1="405" y1="410" x2="455" y2="410" stroke="#22262a" stroke-width="4" opacity="0.5"/>
  </g>
</svg>
