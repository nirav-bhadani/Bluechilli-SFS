<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none" role="img" aria-label="Shared user warehousing with racked pallet aisles">
  <defs>
    <linearGradient id="sw-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f8f9"/>
      <stop offset="1" stop-color="#e7ebee"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#sw-bg)"/>
  <circle cx="650" cy="120" r="150" fill="#e50019" opacity="0.05"/>
  <g stroke="#22262a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <!-- floor -->
    <line x1="80" y1="500" x2="720" y2="500"/>
    <!-- racking uprights -->
    <line x1="170" y1="150" x2="170" y2="500"/>
    <line x1="400" y1="150" x2="400" y2="500"/>
    <line x1="630" y1="150" x2="630" y2="500"/>
    <!-- beams -->
    <line x1="170" y1="240" x2="630" y2="240"/>
    <line x1="170" y1="360" x2="630" y2="360"/>
    <line x1="170" y1="150" x2="630" y2="150"/>
  </g>
  <g stroke="#22262a" stroke-width="5" stroke-linejoin="round">
    <!-- pallets / boxes -->
    <rect x="200" y="180" width="150" height="50" rx="4" fill="#ffffff"/>
    <rect x="450" y="180" width="150" height="50" rx="4" fill="#ffffff"/>
    <rect x="200" y="300" width="150" height="50" rx="4" fill="#e50019" stroke="#e50019"/>
    <rect x="450" y="300" width="150" height="50" rx="4" fill="#ffffff"/>
    <rect x="200" y="420" width="150" height="50" rx="4" fill="#ffffff"/>
    <rect x="450" y="420" width="150" height="50" rx="4" fill="#e50019" stroke="#e50019"/>
  </g>
</svg>
