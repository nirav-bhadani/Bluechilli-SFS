<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none" role="img" aria-label="Reverse logistics returns and restocking">
  <defs>
    <linearGradient id="rl-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f8f9"/>
      <stop offset="1" stop-color="#e7ebee"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#rl-bg)"/>
  <circle cx="400" cy="300" r="190" fill="#e50019" opacity="0.05"/>
  <!-- circular return arrow looping around the parcel -->
  <g stroke="#e50019" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M231 238 A180 180 0 1 1 231 362"/>
    <path d="M265 386 L231 362 L220 403"/>
  </g>
  <g stroke="#22262a" stroke-width="6" stroke-linejoin="round">
    <!-- box (isometric) -->
    <path d="M330 280 L470 280 L470 410 L330 410 Z" fill="#ffffff"/>
    <path d="M330 280 L370 240 L510 240 L470 280 Z" fill="#f1f3f4"/>
    <path d="M470 280 L510 240 L510 370 L470 410 Z" fill="#e9edf0"/>
    <!-- tape -->
    <line x1="400" y1="280" x2="400" y2="410" stroke="#e50019" stroke-width="7"/>
  </g>
</svg>
