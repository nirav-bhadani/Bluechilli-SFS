<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none" role="img" aria-label="E-commerce fulfilment pick pack and dispatch">
  <defs>
    <linearGradient id="ef-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f8f9"/>
      <stop offset="1" stop-color="#e7ebee"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#ef-bg)"/>
  <circle cx="640" cy="460" r="160" fill="#e50019" opacity="0.05"/>
  <g stroke="#22262a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <!-- conveyor -->
    <line x1="90" y1="470" x2="710" y2="470" opacity="0.9"/>
    <circle cx="140" cy="470" r="26" fill="#ffffff"/>
    <circle cx="300" cy="470" r="26" fill="#ffffff"/>
    <circle cx="460" cy="470" r="26" fill="#ffffff"/>
    <circle cx="620" cy="470" r="26" fill="#ffffff"/>
  </g>
  <g stroke="#22262a" stroke-width="6" stroke-linejoin="round">
    <!-- parcel 1 with tape -->
    <rect x="180" y="320" width="150" height="124" rx="6" fill="#ffffff"/>
    <line x1="255" y1="320" x2="255" y2="444" stroke="#e50019" stroke-width="8"/>
    <path d="M180 360 L330 360" stroke="#22262a" stroke-width="4" opacity="0.5"/>
    <!-- parcel 2 (red) -->
    <rect x="420" y="350" width="150" height="94" rx="6" fill="#e50019" stroke="#e50019"/>
    <line x1="495" y1="350" x2="495" y2="444" stroke="#ffffff" stroke-width="6"/>
  </g>
</svg>
